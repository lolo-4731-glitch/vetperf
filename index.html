<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Réhydratation Veau — Calculateur de fluidothérapie</title>
  <meta name="description" content="Calculateur de fluidothérapie pour veaux diarrhéiques — usage professionnel vétérinaire">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐄</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    #root { min-height: 100vh; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

/* ============================================================
   PASSWORD GATE
   ============================================================ */
const PASSWORD = "VETHORIZONS";

const LoginScreen = ({ onLogin }) => {
  const [pwd, setPwd] = useState("");
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  const handleSubmit = () => {
    if (pwd === PASSWORD) {
      onLogin();
    } else {
      setError(true);
      setShake(true);
      setTimeout(() => setShake(false), 500);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter") handleSubmit();
  };

  return (
    <div style={{
      minHeight:"100vh",
      background:"linear-gradient(165deg,#F5F0E8 0%,#E8E0D0 40%,#D4CDB8 100%)",
      display:"flex",alignItems:"center",justifyContent:"center",
      fontFamily:"'Georgia',serif",
    }}>
      <div style={{
        width:"100%",maxWidth:380,padding:"0 20px",
        animation: shake ? "shakeAnim 0.4s ease" : "none",
      }}>
        <div style={{
          background:"#FDFBF7",borderRadius:18,
          border:"1px solid rgba(61,90,62,0.15)",
          boxShadow:"0 8px 32px rgba(0,0,0,0.08)",
          overflow:"hidden",
        }}>
          {/* Header */}
          <div style={{
            background:"linear-gradient(135deg,#3D5A3E 0%,#2C4A2E 50%,#1E3520 100%)",
            padding:"30px 24px 26px",textAlign:"center",position:"relative",
          }}>
            <div style={{
              position:"absolute",top:0,left:0,right:0,bottom:0,
              backgroundImage:"repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.015) 20px,rgba(255,255,255,0.015) 40px)",
            }}/>
            <div style={{position:"relative"}}>
              <div style={{
                width:64,height:64,borderRadius:"50%",background:"rgba(255,255,255,0.12)",
                display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:32,
                border:"2px solid rgba(255,255,255,0.2)",marginBottom:12,
              }}>🐄</div>
              <h1 style={{margin:0,fontSize:21,fontWeight:700,color:"#F5F0E8",letterSpacing:"0.3px"}}>
                Réhydratation Veau
              </h1>
              <p style={{margin:"4px 0 0",fontSize:11,color:"rgba(245,240,232,0.55)",letterSpacing:"1.5px",textTransform:"uppercase",fontFamily:"system-ui,sans-serif"}}>
                Calculateur de fluidothérapie
              </p>
            </div>
          </div>

          {/* Form */}
          <div style={{padding:"28px 24px 30px"}}>
            <div style={{marginBottom:6}}>
              <label style={{
                display:"block",fontSize:11,fontWeight:700,color:"#5A4D3E",marginBottom:6,
                fontFamily:"system-ui,sans-serif",textTransform:"uppercase",letterSpacing:"0.5px",
              }}>Mot de passe</label>
              <input
                type="password"
                value={pwd}
                onChange={e=>{setPwd(e.target.value);setError(false);}}
                onKeyDown={handleKeyDown}
                placeholder="••••••••"
                autoFocus
                style={{
                  padding:"13px 15px",borderRadius:10,
                  border:error?"2px solid #C1292E":"2px solid rgba(0,0,0,0.08)",
                  background:"#FFFDF8",fontSize:16,fontFamily:"system-ui,sans-serif",
                  color:"#2C2416",outline:"none",width:"100%",boxSizing:"border-box",
                  transition:"border-color 0.2s",
                }}
              />
              {error&&<p style={{
                margin:"8px 0 0",fontSize:12,color:"#C1292E",fontWeight:600,
                fontFamily:"system-ui,sans-serif",
              }}>Mot de passe incorrect</p>}
            </div>
            <button onClick={handleSubmit} style={{
              width:"100%",padding:"14px",borderRadius:11,border:"none",marginTop:16,
              background:"linear-gradient(135deg,#3D5A3E,#2C4A2E)",color:"#F5F0E8",
              fontSize:15,fontWeight:700,cursor:"pointer",fontFamily:"'Georgia',serif",
              boxShadow:"0 4px 16px rgba(44,74,46,0.3)",letterSpacing:"0.3px",
            }}>Accéder</button>
          </div>
        </div>
        <p style={{textAlign:"center",marginTop:16,fontSize:11,color:"#8B7B69",fontFamily:"system-ui,sans-serif"}}>
          Accès réservé — usage professionnel vétérinaire
        </p>
      </div>
      <style>{`
        @keyframes shakeAnim {
          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-12px)}
          40%{transform:translateX(10px)}
          60%{transform:translateX(-8px)}
          80%{transform:translateX(6px)}
        }
      `}</style>
    </div>
  );
};

/* ============================================================
   STYLES (stable references, never recreated)
   ============================================================ */
const inputS = { padding:"11px 13px", borderRadius:9, border:"2px solid rgba(0,0,0,0.07)", background:"#FFFDF8", fontSize:14, fontFamily:"system-ui,sans-serif", color:"#2C2416", outline:"none", width:"100%", boxSizing:"border-box" };
const labelS = { display:"block", fontSize:11, fontWeight:700, color:"#5A4D3E", marginBottom:4, fontFamily:"system-ui,sans-serif", textTransform:"uppercase", letterSpacing:"0.5px" };
const sevColor = (d) => d<=5?"#4A7C59":d<=8?"#D4A017":d<=10?"#C75B2A":"#A01E1E";

/* ============================================================
   SUB-COMPONENTS (defined OUTSIDE App to avoid re-mount)
   ============================================================ */

const Card = ({title, icon, children}) => (
  <div style={{marginBottom:14,borderRadius:13,background:"#FDFBF7",border:"1px solid rgba(61,90,62,0.12)",padding:"15px 15px 17px",boxShadow:"0 1px 6px rgba(0,0,0,0.04)"}}>
    {title&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:13}}>
      {icon&&<span style={{fontSize:15}}>{icon}</span>}
      <h3 style={{margin:0,fontSize:13,fontWeight:700,color:"#3D5A3E",fontFamily:"'Georgia',serif"}}>{title}</h3>
    </div>}
    {children}
  </div>
);

const Toggle = ({label, value, onChange}) => (
  <div style={{flex:1}}>
    <label style={labelS}>{label}</label>
    <div style={{display:"flex",gap:6}}>
      {[{v:true,t:"Oui",c:"#4A7C59"},{v:false,t:"Non",c:"#C75B2A"}].map(o=>(
        <button key={String(o.v)} onClick={()=>onChange(o.v)} style={{
          flex:1,padding:"9px",borderRadius:8,
          border:value===o.v?`2px solid ${o.c}`:"2px solid rgba(0,0,0,0.08)",
          background:value===o.v?`${o.c}12`:"#FFFDF8",
          color:value===o.v?o.c:"#7A6B59",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"system-ui,sans-serif",
        }}>{o.t}</button>
      ))}
    </div>
  </div>
);

const TestResult = ({label, value, onChange}) => (
  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(0,0,0,0.04)"}}>
    <span style={{fontSize:13,fontFamily:"system-ui,sans-serif",color:"#2C2416",fontWeight:600}}>{label}</span>
    <div style={{display:"flex",gap:5}}>
      {[{v:true,t:"＋",c:"#C1292E"},{v:false,t:"−",c:"#4A7C59"}].map(o=>(
        <button key={String(o.v)} onClick={()=>onChange(o.v)} style={{
          width:36,height:32,borderRadius:7,fontSize:16,fontWeight:800,cursor:"pointer",
          border:value===o.v?`2px solid ${o.c}`:"2px solid rgba(0,0,0,0.08)",
          background:value===o.v?`${o.c}15`:"#FFFDF8",
          color:value===o.v?o.c:"#AAA",fontFamily:"system-ui,sans-serif",
        }}>{o.t}</button>
      ))}
    </div>
  </div>
);

const VolumeRow = ({label, value, color}) => (
  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0"}}>
    <span style={{fontSize:13,color:"#5A4D3E",fontFamily:"system-ui,sans-serif"}}>{label}</span>
    <span style={{fontSize:14,fontWeight:700,color,fontFamily:"'Georgia',serif"}}>{value}</span>
  </div>
);

const TimelineItem = ({time, text, last}) => (
  <div style={{display:"flex",gap:10,alignItems:"flex-start",paddingBottom:last?0:12,paddingLeft:18,borderLeft:last?"2px solid transparent":"2px solid #D4CDB8",marginLeft:5,position:"relative"}}>
    <div style={{position:"absolute",left:-6,top:1,width:11,height:11,borderRadius:"50%",background:"#3D5A3E",border:"2px solid #FFFDF8"}}/>
    <div style={{paddingLeft:3}}>
      <span style={{fontWeight:800,color:"#3D5A3E",fontSize:11,fontFamily:"system-ui,sans-serif"}}>{time}</span>
      <span style={{marginLeft:7,color:"#4A3D2E",fontSize:12,fontFamily:"system-ui,sans-serif"}}>{text}</span>
    </div>
  </div>
);

const Gauge = ({label, value, min, max, unit, low, high, lowLabel, highLabel, normalLabel, colorStops}) => {
  const numVal = parseFloat(value);
  const isValid = !isNaN(numVal);
  const pct = isValid ? Math.max(0, Math.min(100, ((numVal - min) / (max - min)) * 100)) : 50;
  let statusColor = "#4A7C59";
  let statusText = normalLabel || "Normal";
  if (isValid && low !== undefined && numVal < low) { statusColor = "#C75B2A"; statusText = lowLabel || "Bas"; }
  if (isValid && high !== undefined && numVal > high) { statusColor = "#C1292E"; statusText = highLabel || "Élevé"; }
  return (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
        <span style={{fontSize:12,fontWeight:700,color:"#3D5A3E",fontFamily:"system-ui,sans-serif"}}>{label}</span>
        <span style={{fontSize:14,fontWeight:800,color:isValid?statusColor:"#AAA",fontFamily:"'Georgia',serif"}}>
          {isValid?`${numVal} ${unit||""}`:"—"}
        </span>
      </div>
      <div style={{height:10,borderRadius:5,background:"#E8E0D0",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,bottom:0,background:colorStops||"linear-gradient(to right,#C75B2A 0%,#F4C95D 30%,#4A7C59 45%,#4A7C59 55%,#F4C95D 70%,#C1292E 100%)",opacity:0.7,borderRadius:5}}/>
        {isValid&&<div style={{position:"absolute",top:-2,width:14,height:14,borderRadius:"50%",background:"white",border:`3px solid ${statusColor}`,left:`calc(${pct}% - 7px)`,boxShadow:"0 1px 4px rgba(0,0,0,0.2)",transition:"left 0.4s ease"}}/>}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
        <span style={{fontSize:9,color:"#8B7B69",fontFamily:"system-ui,sans-serif"}}>{min}{unit}</span>
        {isValid&&<span style={{fontSize:10,fontWeight:700,color:statusColor,fontFamily:"system-ui,sans-serif"}}>{statusText}</span>}
        <span style={{fontSize:9,color:"#8B7B69",fontFamily:"system-ui,sans-serif"}}>{max}{unit}</span>
      </div>
    </div>
  );
};

const DiarrheaPill = ({label, positive}) => (
  <div style={{
    display:"inline-flex",alignItems:"center",gap:5,padding:"6px 11px",borderRadius:20,fontSize:12,
    fontWeight:700,fontFamily:"system-ui,sans-serif",
    background:positive===true?"rgba(193,41,46,0.1)":positive===false?"rgba(74,124,89,0.08)":"rgba(0,0,0,0.04)",
    color:positive===true?"#C1292E":positive===false?"#4A7C59":"#AAA",
    border:`1px solid ${positive===true?"rgba(193,41,46,0.2)":positive===false?"rgba(74,124,89,0.15)":"rgba(0,0,0,0.08)"}`,
  }}>
    {positive===true?"＋":positive===false?"−":"?"} {label}
  </div>
);

/* ============================================================
   STATIC DATA (stable references)
   ============================================================ */
const AGENTS = [
  {id:"ecoli",label:"E. coli K99"},{id:"rota",label:"Rotavirus"},{id:"corona",label:"Coronavirus"},
  {id:"crypto",label:"Cryptosporidies"},{id:"salmo",label:"Salmonelles"},{id:"coccid",label:"Coccidiose"},{id:"unknown",label:"Non identifié"},
];
const DEHYDRATION_OPTIONS = [
  {value:5,label:"Légère (5%)",desc:"Yeux légèrement enfoncés, pli cutané < 3s",color:"#A8D5BA"},
  {value:8,label:"Modérée (8%)",desc:"Yeux enfoncés, pli cutané 3-6s, muqueuses sèches",color:"#F4C95D"},
  {value:10,label:"Sévère (10%)",desc:"Yeux très enfoncés, pli cutané > 6s, décubitus",color:"#E07A5F"},
  {value:12,label:"Critique (12%)",desc:"Choc, extrémités froides, coma",color:"#C1292E"},
];
const TABS = [{icon:"🏠",label:"Élevage"},{icon:"🐄",label:"Veau"},{icon:"💉",label:"Perfusion"},{icon:"📊",label:"Récap"},{icon:"📂",label:"Historique"}];

const SOLUTES_DATA = [
  {key:"carbifusion",name:"Carbifusion",bicarb:28,glucose:0,other:"NaHCO₃ pur (56 mg/mL)"},
  {key:"spe2411",name:"Spéciale 2411",bicarb:20,glucose:7.5,other:"+ saccharose 7.5 g"},
  {key:"lodevil",name:"Lodevil",bicarb:2.1,glucose:5.4,other:"NaCl, KCl, MgCl₂, acétate"},
  {key:"glucose5",name:"Glucose 5%",bicarb:0,glucose:25,other:"Isotonique"},
  {key:"dhydrat",name:"D-Hydrat",bicarb:5,glucose:25,other:"NaCl 4.5 g"},
];

/* ============================================================
   MAIN APP
   ============================================================ */
const App = () => {
  const [tab, setTab] = useState(0);
  const summaryRef = useRef(null);

  // Tab 1: Éleveur
  const [farmerName, setFarmerName] = useState("");
  const [farmerAddress, setFarmerAddress] = useState("");
  const [farmerCity, setFarmerCity] = useState("");
  const [farmerPhone, setFarmerPhone] = useState("");
  const [farmerEmail, setFarmerEmail] = useState("");
  const [farmerHerd, setFarmerHerd] = useState("");
  const [diarrheaHist, setDiarrheaHist] = useState([]);
  const [prevCases, setPrevCases] = useState("");
  const [mortality, setMortality] = useState("");
  const [vaccProtocol, setVaccProtocol] = useState("");
  const [colostrum, setColostrum] = useState("");
  const [notes, setNotes] = useState("");

  // Tab 2: Veau — champs individuels pour éviter re-render groupé
  const [calfId, setCalfId] = useState("");
  const [calfAge, setCalfAge] = useState("");
  const [calfWeight, setCalfWeight] = useState("");
  const [calfTemp, setCalfTemp] = useState("");
  const [calfDehydration, setCalfDehydration] = useState(null);
  const [canStand, setCanStand] = useState(null);
  const [suckReflex, setSuckReflex] = useState(null);
  const [diarrheaDuration, setDiarrheaDuration] = useState("");

  // Gaz du sang — champs individuels
  const [bgpH, setBgpH] = useState("");
  const [bgpCO2, setBgpCO2] = useState("");
  const [bgHCO3, setBgHCO3] = useState("");
  // BE calculé automatiquement : BE = HCO3 - 25 + 16.2*(pH - 7.4)
  const computedBE = (() => {
    const ph = parseFloat(bgpH);
    const hco3 = parseFloat(bgHCO3);
    if (!isNaN(ph) && !isNaN(hco3)) return hco3 - 25 + 16.2 * (ph - 7.4);
    return null;
  })();
  const bgBE = computedBE !== null ? computedBE.toFixed(1) : "";
  const [bgNa, setBgNa] = useState("");
  const [bgK, setBgK] = useState("");
  const [bgCl, setBgCl] = useState("");

  const [bgGlucose, setBgGlucose] = useState("");

  // Analyse diarrhée
  const [testRota, setTestRota] = useState(null);
  const [testCorona, setTestCorona] = useState(null);
  const [testCrypto, setTestCrypto] = useState(null);
  const [testColiK99, setTestColiK99] = useState(null);
  const [testColiCS31A, setTestColiCS31A] = useState(null);

  // Tab 3: Perfusion
  const [perfusion, setPerfusion] = useState(null);
  const [selectedSolutes, setSelectedSolutes] = useState({carbifusion:0,spe2411:0,lodevil:0,glucose5:0,dhydrat:0});

  // ============ HISTORY SYSTEM ============
  const [history, setHistory] = useState([]);
  const [historyLoaded, setHistoryLoaded] = useState(false);
  const [selectedFarmer, setSelectedFarmer] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  // Load history on mount
  const loadHistory = useCallback(() => {
    try {
      const raw = localStorage.getItem("fiches-history");
      if (raw) setHistory(JSON.parse(raw));
    } catch(e) { /* no data yet */ }
    setHistoryLoaded(true);
  }, []);

  // Save history
  const saveHistory = useCallback((newHistory) => {
    try {
      localStorage.setItem("fiches-history", JSON.stringify(newHistory));
    } catch(e) { console.error("Storage error:", e); }
  }, []);

  // Auto-load on mount
  if (!historyLoaded) loadHistory();

  // Save current fiche
  const saveFiche = useCallback(() => {
    const fiche = {
      id: Date.now().toString(),
      date: new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}),
      farmer: { name:farmerName, address:farmerAddress, city:farmerCity, phone:farmerPhone, email:farmerEmail, herd:farmerHerd },
      diarrheaHistory: { agents:diarrheaHist, prevCases, mortality, vaccProtocol, colostrum, notes },
      calf: { id:calfId, age:calfAge, weight:calfWeight, temp:calfTemp, dehydration:calfDehydration, canStand, suckReflex, diarrheaDuration },
      bloodGas: { pH:bgpH, pCO2:bgpCO2, HCO3:bgHCO3, BE:bgBE, Na:bgNa, K:bgK, Cl:bgCl, glucose:bgGlucose },
      tests: { rota:testRota, corona:testCorona, crypto:testCrypto, coliK99:testColiK99, coliCS31A:testColiCS31A },
      perfusion,
    };
    const newHistory = [fiche, ...history].slice(0, 200); // max 200 fiches
    setHistory(newHistory);
    saveHistory(newHistory);
    return fiche;
  }, [farmerName,farmerAddress,farmerCity,farmerPhone,farmerEmail,farmerHerd,diarrheaHist,prevCases,mortality,vaccProtocol,colostrum,notes,calfId,calfAge,calfWeight,calfTemp,calfDehydration,canStand,suckReflex,diarrheaDuration,bgpH,bgpCO2,bgHCO3,bgBE,bgNa,bgK,bgCl,bgGlucose,testRota,testCorona,testCrypto,testColiK99,testColiCS31A,perfusion,history,saveHistory]);

  // Restore a fiche
  const restoreFiche = useCallback((fiche) => {
    const f = fiche.farmer || {};
    setFarmerName(f.name||""); setFarmerAddress(f.address||""); setFarmerCity(f.city||"");
    setFarmerPhone(f.phone||""); setFarmerEmail(f.email||""); setFarmerHerd(f.herd||"");
    const dh = fiche.diarrheaHistory || {};
    setDiarrheaHist(dh.agents||[]); setPrevCases(dh.prevCases||""); setMortality(dh.mortality||"");
    setVaccProtocol(dh.vaccProtocol||""); setColostrum(dh.colostrum||""); setNotes(dh.notes||"");
    const c = fiche.calf || {};
    setCalfId(c.id||""); setCalfAge(c.age||""); setCalfWeight(c.weight||""); setCalfTemp(c.temp||"");
    setCalfDehydration(c.dehydration||null); setCanStand(c.canStand!=null?c.canStand:null);
    setSuckReflex(c.suckReflex!=null?c.suckReflex:null); setDiarrheaDuration(c.diarrheaDuration||"");
    const bg = fiche.bloodGas || {};
    setBgpH(bg.pH||""); setBgpCO2(bg.pCO2||""); setBgHCO3(bg.HCO3||"");
    setBgNa(bg.Na||""); setBgK(bg.K||""); setBgCl(bg.Cl||""); setBgGlucose(bg.glucose||"");
    const t = fiche.tests || {};
    setTestRota(t.rota!=null?t.rota:null); setTestCorona(t.corona!=null?t.corona:null);
    setTestCrypto(t.crypto!=null?t.crypto:null); setTestColiK99(t.coliK99!=null?t.coliK99:null);
    setTestColiCS31A(t.coliCS31A!=null?t.coliCS31A:null);
    setPerfusion(fiche.perfusion||null);
    setTab(0);
  }, []);

  // Delete a fiche
  const deleteFiche = useCallback((ficheId) => {
    const newHistory = history.filter(f => f.id !== ficheId);
    setHistory(newHistory);
    saveHistory(newHistory);
    setConfirmDelete(null);
  }, [history, saveHistory]);

  // New fiche (reset all)
  const resetAll = useCallback(() => {
    setFarmerName(""); setFarmerAddress(""); setFarmerCity(""); setFarmerPhone(""); setFarmerEmail(""); setFarmerHerd("");
    setDiarrheaHist([]); setPrevCases(""); setMortality(""); setVaccProtocol(""); setColostrum(""); setNotes("");
    setCalfId(""); setCalfAge(""); setCalfWeight(""); setCalfTemp("");
    setCalfDehydration(null); setCanStand(null); setSuckReflex(null); setDiarrheaDuration("");
    setBgpH(""); setBgpCO2(""); setBgHCO3(""); setBgNa(""); setBgK(""); setBgCl(""); setBgGlucose("");
    setTestRota(null); setTestCorona(null); setTestCrypto(null); setTestColiK99(null); setTestColiCS31A(null);
    setPerfusion(null); setSelectedSolutes({carbifusion:0,spe2411:0,lodevil:0,glucose5:0,dhydrat:0}); setTab(0);
  }, []);

  // Group history by farmer
  const farmerGroups = history.reduce((acc, fiche) => {
    const key = (fiche.farmer && fiche.farmer.name) || "Sans nom";
    if (!acc[key]) acc[key] = [];
    acc[key].push(fiche);
    return acc;
  }, {});

  const toggleAgent = useCallback((id) => {
    setDiarrheaHist(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  }, []);

  const calculatePerfusion = useCallback(() => {
    const w = parseFloat(calfWeight) || 0;
    const d = calfDehydration || 0;
    if (!w || !d) return;
    const deficit = (w * d) / 100;
    const maintenance = (w * 65) / 1000;
    const dur = parseFloat(diarrheaDuration) || 1;
    const ongoingLosses = dur > 2 ? w * 0.04 : w * 0.02;
    const totalVolume = deficit + maintenance + ongoingLosses;

    const be = parseFloat(bgBE);

              </div>
              <div style={{display:"flex",gap:8}}>
                <div style={{flex:1}}><label style={labelS}>Cl⁻ (mmol/L)</label><input type="number" step="0.1" value={bgCl} onChange={e=>setBgCl(e.target.value)} placeholder="100" style={inputS}/></div>
                <div style={{flex:1}}><label style={labelS}>Glucose (mg/dL)</label><input type="number" step="1" value={bgGlucose} onChange={e=>setBgGlucose(e.target.value)} placeholder="80" style={inputS}/></div>
              </div>
            </div>
          </Card>

          <Card title="Analyse diarrhée (test rapide)" icon="🧪">
            <TestResult label="Rotavirus" value={testRota} onChange={setTestRota}/>
            <TestResult label="Coronavirus" value={testCorona} onChange={setTestCorona}/>
            <TestResult label="Cryptosporidies" value={testCrypto} onChange={setTestCrypto}/>
            <TestResult label="E. coli K99" value={testColiK99} onChange={setTestColiK99}/>
            <TestResult label="E. coli CS31A" value={testColiCS31A} onChange={setTestColiCS31A}/>
          </Card>

          <button onClick={calculatePerfusion} disabled={!calfWeight||!calfDehydration} style={{
            width:"100%",padding:"14px",borderRadius:11,border:"none",
            background:calfWeight&&calfDehydration?"linear-gradient(135deg,#3D5A3E,#2C4A2E)":"#B8AE9E",
            color:"#F5F0E8",fontSize:14,fontWeight:700,cursor:calfWeight&&calfDehydration?"pointer":"not-allowed",
            fontFamily:"'Georgia',serif",boxShadow:calfWeight&&calfDehydration?"0 4px 14px rgba(44,74,46,0.3)":"none",
          }}>{calfWeight&&calfDehydration?"Calculer le plan de perfusion →":"Remplir poids et déshydratation"}</button>
        </div>}

        {/* ============ TAB 2: PERFUSION ============ */}
        {tab===2&&<div>
          {!perfusion?<Card title="Aucun calcul" icon="⚠️"><p style={{fontSize:13,color:"#7A6B59",fontFamily:"system-ui,sans-serif"}}>Remplissez l'onglet "Veau" puis lancez le calcul.</p></Card>
          :<>
            <Card title="Bilan hydrique (24h)" icon="💧">
              <VolumeRow label="Déficit à combler" value={`${perfusion.deficit} L`} color="#3D5A3E"/>
              <VolumeRow label="Besoins d'entretien" value={`${perfusion.maintenancePerH} mL/h`} color="#5B7B5E"/>
              <VolumeRow label="Pertes en cours" value={`${perfusion.ongoingLosses} L`} color="#8B7355"/>
              <div style={{borderTop:"2px solid #3D5A3E",paddingTop:8,marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:800,fontSize:15,color:"#2C2416",fontFamily:"system-ui,sans-serif"}}>Volume total</span>
                <span style={{fontWeight:800,fontSize:20,color:"#3D5A3E",fontFamily:"'Georgia',serif"}}>{perfusion.totalVolume} L</span>
              </div>
            </Card>

            {perfusion.needsIV&&<Card title="Voie intraveineuse" icon="💉">
              <div style={{fontSize:13,color:"#5A4530",fontFamily:"system-ui,sans-serif",lineHeight:1.7}}>
                <p style={{margin:"0 0 4px"}}><strong>Volume IV :</strong> {perfusion.ivVolume} L (= ½ du déficit)</p>
                {parseFloat(perfusion.bicarb_mmol)>0&&<div style={{background:"rgba(160,120,76,0.08)",borderRadius:8,padding:"10px 12px",margin:"8px 0",border:"1px solid rgba(160,120,76,0.2)"}}>
                  <p style={{margin:"0 0 3px",fontWeight:700,color:"#A0784C"}}>NaHCO₃</p>
                  <p style={{margin:0}}><strong>{perfusion.bicarb_g} g</strong> de bicarbonate de sodium</p>
                  <p style={{margin:"3px 0 0",fontSize:10,color:"#8B7355"}}>|BE| × poids × 0.6 = {perfusion.bicarb_mmol} mmol → {perfusion.bicarb_g} g</p>
                </div>}
                {perfusion.kSupplement&&<p style={{margin:"6px 0 0",fontSize:12,color:"#C75B2A",fontWeight:600}}>⚠️ {perfusion.kSupplement}</p>}
                {perfusion.glucoseSupplement&&<div style={{
                  background:perfusion.glycemiaAlert==="danger"?"rgba(193,41,46,0.08)":perfusion.glycemiaAlert==="high"?"rgba(199,91,42,0.08)":"rgba(212,160,23,0.08)",
                  borderRadius:8,padding:"10px 12px",margin:"8px 0",
                  border:`1px solid ${perfusion.glycemiaAlert==="danger"?"rgba(193,41,46,0.2)":perfusion.glycemiaAlert==="high"?"rgba(199,91,42,0.2)":"rgba(212,160,23,0.2)"}`,
                }}>
                  <p style={{margin:0,fontWeight:700,fontSize:12,color:perfusion.glycemiaAlert==="danger"?"#C1292E":perfusion.glycemiaAlert==="high"?"#C75B2A":"#D4A017"}}>🩸 Glycémie</p>
                  <p style={{margin:"4px 0 0",fontSize:12,color:"#5A4530"}}>{perfusion.glucoseSupplement}</p>
                </div>}
              </div>
            </Card>}

            <Card title="Solutés vétérinaires — Sélection" icon="🧴">
              {(()=>{
                const bicarbNeed = parseFloat(perfusion.bicarb_g)||0;
                const bicarbProvided = SOLUTES_DATA.reduce((sum,s)=>sum + s.bicarb * (selectedSolutes[s.key]||0), 0);
                const bicarbRemaining = bicarbNeed - bicarbProvided;
                const glucoseProvided = SOLUTES_DATA.reduce((sum,s)=>sum + s.glucose * (selectedSolutes[s.key]||0), 0);
                const totalFlacons = Object.values(selectedSolutes).reduce((a,b)=>a+b,0);
                const totalVolume = totalFlacons * 500;
                return <>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {SOLUTES_DATA.map((s,i)=>{
                      const qty = selectedSolutes[s.key]||0;
                      const isSelected = qty > 0;
                      return (
                        <div key={s.key} style={{
                          borderRadius:10,padding:"10px 12px",
                          border:isSelected?`2px solid #3D5A3E`:"2px solid rgba(0,0,0,0.07)",
                          background:isSelected?"rgba(61,90,62,0.06)":"#FFFDF8",
                          transition:"all 0.2s",
                        }}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:700,fontSize:13,color:isSelected?"#3D5A3E":"#5A4D3E",fontFamily:"system-ui,sans-serif"}}>{s.name}</div>
                              <div style={{fontSize:10,color:"#7A6B59",fontFamily:"system-ui,sans-serif",marginTop:2}}>
                                {s.bicarb>0?`NaHCO₃ ${s.bicarb}g`:"—"}
                                {s.bicarb>0&&s.glucose>0?" · ":""}
                                {s.glucose>0?`Glucose ${s.glucose}g`:""}
                                {!s.bicarb&&!s.glucose?"—":""}
                                {" / flacon"}
                              </div>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:4}}>
                              <button onClick={()=>setSelectedSolutes(prev=>({...prev,[s.key]:Math.max(0,prev[s.key]-1)}))} style={{
                                width:32,height:32,borderRadius:8,border:"2px solid rgba(0,0,0,0.1)",background:"#FFFDF8",
                                fontSize:18,fontWeight:800,cursor:"pointer",color:qty>0?"#C75B2A":"#CCC",
                                display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"system-ui,sans-serif",
                              }}>−</button>
                              <span style={{width:28,textAlign:"center",fontWeight:800,fontSize:16,color:isSelected?"#3D5A3E":"#AAA",fontFamily:"'Georgia',serif"}}>{qty}</span>
                              <button onClick={()=>setSelectedSolutes(prev=>({...prev,[s.key]:prev[s.key]+1}))} style={{
                                width:32,height:32,borderRadius:8,border:"2px solid rgba(61,90,62,0.3)",background:"rgba(61,90,62,0.06)",
                                fontSize:18,fontWeight:800,cursor:"pointer",color:"#3D5A3E",
                                display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"system-ui,sans-serif",
                              }}>+</button>
                            </div>
                          </div>
                          {isSelected&&<div style={{marginTop:6,fontSize:10,color:"#5A4D3E",fontFamily:"system-ui,sans-serif"}}>
                            → {qty} fl. × 500 mL = {qty*500} mL
                            {s.bicarb>0?` · ${(s.bicarb*qty).toFixed(1)}g NaHCO₃`:""}
                            {s.glucose>0?` · ${(s.glucose*qty).toFixed(1)}g glucose`:""}
                          </div>}
                        </div>
                      );
                    })}
                  </div>

                  {totalFlacons>0&&<div style={{marginTop:12,borderRadius:10,border:"2px solid #3D5A3E",background:"rgba(61,90,62,0.04)",padding:"12px 14px"}}>
                    <div style={{fontWeight:700,fontSize:12,color:"#3D5A3E",fontFamily:"system-ui,sans-serif",marginBottom:8}}>📋 Récapitulatif solutés sélectionnés</div>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12,fontFamily:"system-ui,sans-serif",color:"#5A4D3E"}}>
                      <span>Volume total</span>
                      <span style={{fontWeight:700}}>{totalVolume} mL ({(totalVolume/1000).toFixed(1)} L)</span>
                    </div>
                    {bicarbNeed>0&&<>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12,fontFamily:"system-ui,sans-serif",color:"#A0784C"}}>
                        <span>NaHCO₃ apporté</span>
                        <span style={{fontWeight:700}}>{bicarbProvided.toFixed(1)} g / {bicarbNeed.toFixed(1)} g besoin</span>
                      </div>
                      <div style={{height:8,borderRadius:4,background:"#E8E0D0",overflow:"hidden",margin:"4px 0 6px"}}>
                        <div style={{height:"100%",borderRadius:4,transition:"width 0.3s",
                          width:`${Math.min(100,(bicarbProvided/bicarbNeed)*100)}%`,
                          background:bicarbRemaining<=0?"#4A7C59":bicarbRemaining<bicarbNeed*0.2?"#F4C95D":"#C75B2A",
                        }}/>
                      </div>
                      {bicarbRemaining>0
                        ?<div style={{fontSize:11,fontWeight:700,color:"#C75B2A",fontFamily:"system-ui,sans-serif"}}>
                          ⚠️ Reste {bicarbRemaining.toFixed(1)} g NaHCO₃ à couvrir
                        </div>
                        :<div style={{fontSize:11,fontWeight:700,color:"#4A7C59",fontFamily:"system-ui,sans-serif"}}>
                          ✓ Besoin en NaHCO₃ couvert ({bicarbProvided.toFixed(1)} g ≥ {bicarbNeed.toFixed(1)} g)
                        </div>
                      }
                    </>}
                    {glucoseProvided>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:12,fontFamily:"system-ui,sans-serif",color:"#4A7C59",marginTop:4}}>
                      <span>Glucose apporté</span>
                      <span style={{fontWeight:700}}>{glucoseProvided.toFixed(1)} g</span>
                    </div>}
                  </div>}
                </>;
              })()}
            </Card>

            <Card title="Voie orale (SRO)" icon="🍼">
              <div style={{fontSize:13,color:"#2C4A2E",fontFamily:"system-ui,sans-serif",lineHeight:1.7}}>
                <p style={{margin:"0 0 4px"}}><strong>Volume oral :</strong> {perfusion.oralVolume} L / 24h</p>
                <p style={{margin:"0 0 4px"}}><strong>Répartition :</strong> {perfusion.numberOfFeeds} prises de ~{perfusion.volumePerFeed} L</p>
                <p style={{margin:"0 0 4px"}}><strong>Max/prise :</strong> {perfusion.maxPerFeed} L</p>
                {suckReflex===false&&<p style={{margin:"4px 0 0",fontSize:11,color:"#C75B2A",fontWeight:600}}>⚠️ Sonde œsophagienne recommandée</p>}
              </div>
            </Card>

            <Card title="Planning suggéré" icon="⏱️">
              <div style={{fontSize:12,fontFamily:"system-ui,sans-serif",color:"#4A3D2E"}}>
                {perfusion.needsIV&&<TimelineItem time="H0" text={`Bolus IV ${perfusion.ivVolume}L${parseFloat(perfusion.bicarb_mmol)>0?` + NaHCO₃ ${perfusion.bicarb_g}g`:""}`}/>}
                {Array.from({length:Math.min(perfusion.numberOfFeeds,6)},(_,i)=>{
                  const startH=perfusion.needsIV?2:0;
                  const interval=Math.max(3,Math.floor(24/perfusion.numberOfFeeds));
                  return <TimelineItem key={i} time={`H${startH+i*interval}`} text={`SRO ${perfusion.volumePerFeed}L ${suckReflex===false?"(sonde)":"(biberon/seau)"}`}/>;
                })}
                <TimelineItem time="H24" text="Réévaluation clinique + gaz du sang" last/>
              </div>
            </Card>
            <button onClick={()=>setTab(3)} style={{width:"100%",padding:"14px",borderRadius:11,border:"none",background:"linear-gradient(135deg,#3D5A3E,#2C4A2E)",color:"#F5F0E8",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Georgia',serif",boxShadow:"0 4px 14px rgba(44,74,46,0.3)"}}>Voir le récapitulatif →</button>
          </>}
        </div>}

        {/* ============ TAB 3: RÉCAPITULATIF ============ */}
        {tab===3&&<div ref={summaryRef}>
          {farmerName&&<div style={{padding:"10px 13px",borderRadius:10,marginBottom:12,background:"rgba(61,90,62,0.06)",border:"1px solid rgba(61,90,62,0.12)",fontSize:12,color:"#3D5A3E",fontFamily:"system-ui,sans-serif"}}>
            <strong>{farmerName}</strong>{farmerAddress?` — ${farmerAddress}`:""}{farmerCity?`, ${farmerCity}`:""}{farmerPhone?` — Tél: ${farmerPhone}`:""}
          </div>}

          {calfId&&<div style={{padding:"8px 13px",borderRadius:10,marginBottom:12,background:"rgba(139,115,85,0.06)",border:"1px solid rgba(139,115,85,0.12)",fontSize:12,color:"#5A4D3E",fontFamily:"system-ui,sans-serif"}}>
            Veau <strong>{calfId}</strong> — {calfAge?`${calfAge}j`:""} {calfWeight?`— ${calfWeight}kg`:""}
          </div>}

          <Card title="Paramètres cliniques" icon="📊">
            <Gauge label="Température" value={calfTemp} min={35} max={42} unit="°C" low={37.5} high={39.5} lowLabel="Hypothermie" highLabel="Hyperthermie" colorStops="linear-gradient(to right,#2196F3 0%,#4A7C59 30%,#4A7C59 60%,#F4C95D 75%,#C1292E 100%)"/>
            <Gauge label="pH sanguin" value={bgpH} min={6.8} max={7.7} unit="" low={7.35} high={7.5} lowLabel="Acidose" highLabel="Alcalose" colorStops="linear-gradient(to right,#C1292E 0%,#C75B2A 25%,#F4C95D 40%,#4A7C59 55%,#4A7C59 70%,#F4C95D 85%,#C1292E 100%)"/>
            <Gauge label="Déficit en bases (|BE|)" value={bgBE ? Math.abs(parseFloat(bgBE)) : ""} min={0} max={30} unit="mmol/L" low={0} high={5} lowLabel="" highLabel="Acidose métabolique" normalLabel="Normal" colorStops="linear-gradient(to right,#4A7C59 0%,#4A7C59 15%,#F4C95D 25%,#C75B2A 45%,#C1292E 100%)"/>
            <Gauge label="Bicarbonates (HCO₃⁻)" value={bgHCO3} min={5} max={40} unit="mmol/L" low={22} high={30} lowLabel="Bas" highLabel="Élevé" colorStops="linear-gradient(to right,#C1292E 0%,#C75B2A 30%,#F4C95D 40%,#4A7C59 50%,#4A7C59 65%,#F4C95D 75%,#C1292E 100%)"/>
            <Gauge label="Potassium (K⁺)" value={bgK} min={2} max={8} unit="mmol/L" low={3.5} high={5.5} lowLabel="Hypokaliémie" highLabel="Hyperkaliémie" colorStops="linear-gradient(to right,#C1292E 0%,#C75B2A 15%,#F4C95D 25%,#4A7C59 35%,#4A7C59 60%,#F4C95D 70%,#C75B2A 85%,#C1292E 100%)"/>
            <Gauge label="Glucose" value={bgGlucose} min={20} max={200} unit="mg/dL" low={60} high={120} lowLabel="Hypoglycémie" highLabel="Hyperglycémie" colorStops="linear-gradient(to right,#C1292E 0%,#C75B2A 15%,#F4C95D 22%,#4A7C59 30%,#4A7C59 55%,#F4C95D 65%,#C75B2A 80%,#C1292E 100%)"/>
          </Card>

          <Card title="Analyse diarrhée" icon="🧪">
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              <DiarrheaPill label="Rotavirus" positive={testRota}/>
              <DiarrheaPill label="Coronavirus" positive={testCorona}/>
              <DiarrheaPill label="Cryptosporidies" positive={testCrypto}/>
              <DiarrheaPill label="E. coli K99" positive={testColiK99}/>
              <DiarrheaPill label="E. coli CS31A" positive={testColiCS31A}/>
            </div>
          </Card>

          {perfusion&&<Card title="Plan de perfusion" icon="💉">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:9,background:`${sevColor(perfusion.dehydrationPercent)}12`,border:`1px solid ${sevColor(perfusion.dehydrationPercent)}30`,marginBottom:10}}>
              <span style={{fontSize:12,fontWeight:700,color:sevColor(perfusion.dehydrationPercent),fontFamily:"system-ui,sans-serif"}}>Déshydratation {perfusion.dehydrationPercent}%</span>
              <span style={{fontSize:16,fontWeight:800,color:sevColor(perfusion.dehydrationPercent),fontFamily:"'Georgia',serif"}}>{perfusion.totalVolume} L</span>
            </div>
            {perfusion.needsIV&&<div style={{fontSize:12,fontFamily:"system-ui,sans-serif",color:"#5A4530",lineHeight:1.6,marginBottom:6}}>
              <p style={{margin:"0 0 2px"}}><strong>IV :</strong> {perfusion.ivVolume} L (= ½ du déficit)</p>
              {parseFloat(perfusion.bicarb_mmol)>0&&<p style={{margin:"0 0 2px"}}><strong>NaHCO₃ :</strong> {perfusion.bicarb_g} g</p>}
              {perfusion.glucoseSupplement&&<p style={{margin:"0 0 2px",color:perfusion.glycemiaAlert==="danger"?"#C1292E":"#C75B2A"}}><strong>🩸 </strong>{perfusion.glucoseSupplement}</p>}
            </div>}
            <div style={{fontSize:12,fontFamily:"system-ui,sans-serif",color:"#2C4A2E",lineHeight:1.6}}>
              <p style={{margin:0}}><strong>SRO :</strong> {perfusion.oralVolume} L — {perfusion.numberOfFeeds}× {perfusion.volumePerFeed} L</p>
            </div>
          </Card>}

          <button onClick={exportPDF} style={{
            width:"100%",padding:"14px",borderRadius:11,border:"none",
            background:"linear-gradient(135deg,#8B4513,#A0522D)",color:"#F5F0E8",
            fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Georgia',serif",
            boxShadow:"0 4px 14px rgba(139,69,19,0.3)",
            display:"flex",alignItems:"center",justifyContent:"center",gap:8,
          }}>📄 Exporter en PDF</button>

          {showPrintFrame&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:1000,background:"rgba(0,0,0,0.5)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <div style={{background:"white",borderRadius:12,padding:16,maxWidth:500,width:"90%",maxHeight:"85vh",display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <h3 style={{margin:0,fontSize:14,color:"#3D5A3E",fontFamily:"'Georgia',serif"}}>📄 Aperçu — Fiche Réhydratation</h3>
                <button onClick={()=>setShowPrintFrame(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>✕</button>
              </div>
              <iframe srcDoc={printHtml} style={{width:"100%",height:"60vh",border:"1px solid #ddd",borderRadius:8}} title="print-preview"/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{
                  const iframe = document.querySelector('iframe[title="print-preview"]');
                  if(iframe){iframe.contentWindow.print();}
                }} style={{flex:1,padding:"12px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#3D5A3E,#2C4A2E)",color:"#F5F0E8",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Georgia',serif"}}>🖨️ Imprimer / Enregistrer PDF</button>
                <button onClick={()=>setShowPrintFrame(false)} style={{padding:"12px 20px",borderRadius:9,border:"2px solid #ddd",background:"white",color:"#5A4D3E",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"system-ui,sans-serif"}}>Fermer</button>
              </div>
            </div>
          </div>}

          <div style={{padding:"12px",borderRadius:9,background:"rgba(0,0,0,0.03)",fontSize:10,color:"#8B7B69",lineHeight:1.5,fontFamily:"system-ui,sans-serif",marginTop:12}}>
            ⚕️ <strong>Avertissement :</strong> Outil d'aide à la décision. Ne remplace pas le jugement clinique vétérinaire.
          </div>
        </div>}

        {/* ============ TAB 4: HISTORIQUE ============ */}
        {tab===4&&<div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <button onClick={resetAll} style={{
              flex:1,padding:"12px",borderRadius:11,border:"none",
              background:"linear-gradient(135deg,#3D5A3E,#2C4A2E)",color:"#F5F0E8",
              fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"'Georgia',serif",
              boxShadow:"0 4px 14px rgba(44,74,46,0.3)",
            }}>＋ Nouvelle fiche</button>
          </div>

          {!historyLoaded?<Card title="Chargement..." icon="⏳"><p style={{fontSize:13,color:"#7A6B59",fontFamily:"system-ui,sans-serif"}}>Lecture de l'historique...</p></Card>
          :history.length===0?<Card title="Aucune fiche enregistrée" icon="📭"><p style={{fontSize:13,color:"#7A6B59",fontFamily:"system-ui,sans-serif"}}>Les fiches seront automatiquement sauvegardées lors du calcul de perfusion.</p></Card>
          :selectedFarmer===null?<>
            <Card title={`Éleveurs (${Object.keys(farmerGroups).length})`} icon="👥">
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {Object.entries(farmerGroups).map(([name, fiches])=>(
                  <button key={name} onClick={()=>setSelectedFarmer(name)} style={{
                    display:"flex",justifyContent:"space-between",alignItems:"center",
                    padding:"12px 14px",borderRadius:10,border:"2px solid rgba(61,90,62,0.12)",
                    background:"#FDFBF7",cursor:"pointer",textAlign:"left",
                  }}>
                    <div>
                      <div style={{fontWeight:700,fontSize:14,color:"#3D5A3E",fontFamily:"'Georgia',serif"}}>{name}</div>
                      <div style={{fontSize:11,color:"#7A6B59",fontFamily:"system-ui,sans-serif",marginTop:2}}>
                        {fiches.length} fiche{fiches.length>1?"s":""} — dernière : {fiches[0].date}
                      </div>
                    </div>
                    <span style={{fontSize:18,color:"#3D5A3E"}}>›</span>
                  </button>
                ))}
              </div>
            </Card>
          </>
          :<>
            <button onClick={()=>{setSelectedFarmer(null);setConfirmDelete(null);}} style={{
              display:"flex",alignItems:"center",gap:6,padding:"8px 0",border:"none",background:"none",
              cursor:"pointer",fontSize:13,fontWeight:700,color:"#3D5A3E",fontFamily:"system-ui,sans-serif",marginBottom:10,
            }}>← Retour aux éleveurs</button>

            <Card title={selectedFarmer} icon="🏠">
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {(farmerGroups[selectedFarmer]||[]).map(fiche=>(
                  <div key={fiche.id} style={{
                    borderRadius:10,border:"1px solid rgba(61,90,62,0.12)",background:"#FFFDF8",overflow:"hidden",
                  }}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px"}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13,color:"#2C2416",fontFamily:"system-ui,sans-serif"}}>
                          {fiche.calf&&fiche.calf.id?`🐄 ${fiche.calf.id}`:"Veau non identifié"}
                        </div>
                        <div style={{fontSize:11,color:"#7A6B59",fontFamily:"system-ui,sans-serif",marginTop:2}}>
                          {fiche.date}
                          {fiche.calf&&fiche.calf.weight?` — ${fiche.calf.weight} kg`:""}
                          {fiche.calf&&fiche.calf.dehydration?` — Déshydr. ${fiche.calf.dehydration}%`:""}
                        </div>
                        {fiche.perfusion&&<div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap"}}>
                          <span style={{fontSize:10,padding:"3px 7px",borderRadius:10,background:"rgba(61,90,62,0.08)",color:"#3D5A3E",fontWeight:700,fontFamily:"system-ui,sans-serif"}}>
                            Vol: {fiche.perfusion.totalVolume}L
                          </span>
                          {fiche.bloodGas&&fiche.bloodGas.pH&&<span style={{fontSize:10,padding:"3px 7px",borderRadius:10,background:"rgba(139,115,85,0.08)",color:"#5A4D3E",fontWeight:600,fontFamily:"system-ui,sans-serif"}}>
                            pH {fiche.bloodGas.pH}
                          </span>}
                          {fiche.bloodGas&&fiche.bloodGas.BE&&<span style={{fontSize:10,padding:"3px 7px",borderRadius:10,background:"rgba(199,91,42,0.08)",color:"#C75B2A",fontWeight:600,fontFamily:"system-ui,sans-serif"}}>
                            BE {fiche.bloodGas.BE}
                          </span>}
                        </div>}
                      </div>
                    </div>
                    <div style={{display:"flex",borderTop:"1px solid rgba(0,0,0,0.05)"}}>
                      <button onClick={()=>restoreFiche(fiche)} style={{
                        flex:1,padding:"9px",border:"none",background:"rgba(61,90,62,0.04)",
                        color:"#3D5A3E",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"system-ui,sans-serif",
                      }}>📋 Charger</button>
                      {confirmDelete===fiche.id
                        ?<button onClick={()=>deleteFiche(fiche.id)} style={{
                          flex:1,padding:"9px",border:"none",background:"rgba(193,41,46,0.1)",
                          color:"#C1292E",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"system-ui,sans-serif",
                        }}>Confirmer suppression</button>
                        :<button onClick={()=>setConfirmDelete(fiche.id)} style={{
                          flex:1,padding:"9px",border:"none",background:"transparent",
                          color:"#AAA",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"system-ui,sans-serif",
                        }}>🗑 Supprimer</button>
                      }
                    </div>
                  </div>
                ))}
              </div>
            </Card>
          </>}
        </div>}
      </div>
    </div>
  );
};

/* ============================================================
   ROOT WITH PASSWORD GATE
   ============================================================ */
const Root = () => {
  const [authenticated, setAuthenticated] = useState(false);
  if (!authenticated) return <LoginScreen onLogin={() => setAuthenticated(true)} />;
  return <App />;
};



    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
  </script>
</body>
</html>
